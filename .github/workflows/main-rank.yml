name: Main Rank

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'participants/**'

permissions:
  contents: read

jobs:
  rank:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tests (Playwright)
        working-directory: tests
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Bench all teams
        run: |
          mkdir -p results
          for TEAM_DIR in participants/*/; do
            TEAM=$(basename "$TEAM_DIR")
            [ ! -f "$TEAM_DIR/package.json" ] && continue

            echo ""
            echo "======================================="
            echo "  Benchmarking: $TEAM"
            echo "======================================="

            cd "$TEAM_DIR"
            rm -f data.db data.db-* package-lock.json

            if ! npm install 2>&1; then
              echo "{\"team\":\"$TEAM\",\"summary\":{\"pass\":0,\"fail\":1,\"total\":1},\"rules\":[],\"frontend\":[],\"stress\":[],\"error\":\"npm install failed\"}" > "../../results/$TEAM.json"
              cd ../..
              continue
            fi

            if ! npm run build 2>&1; then
              echo "{\"team\":\"$TEAM\",\"summary\":{\"pass\":0,\"fail\":1,\"total\":1},\"rules\":[],\"frontend\":[],\"stress\":[],\"error\":\"npm run build failed\"}" > "../../results/$TEAM.json"
              cd ../..
              continue
            fi

            npm start &
            SERVER_PID=$!
            cd ../..

            READY=false
            for i in $(seq 1 30); do
              curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && READY=true && break
              sleep 1
            done

            if [ "$READY" = false ]; then
              echo "{\"team\":\"$TEAM\",\"summary\":{\"pass\":0,\"fail\":1,\"total\":1},\"rules\":[],\"frontend\":[],\"stress\":[],\"error\":\"server timeout\"}" > "results/$TEAM.json"
              kill $SERVER_PID 2>/dev/null
              continue
            fi

            node --test tests/run.js || true
            cp tests/results.json "results/$TEAM.json" 2>/dev/null || \
              echo "{\"team\":\"$TEAM\",\"summary\":{\"pass\":0,\"fail\":1,\"total\":1},\"rules\":[],\"frontend\":[],\"stress\":[],\"error\":\"tests crashed\"}" > "results/$TEAM.json"

            # Inject team name
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('results/$TEAM.json','utf8'));
              r.team = '$TEAM';
              const info = JSON.parse(fs.readFileSync('$TEAM_DIR/info.json','utf8') || '{}');
              r.info = info;
              fs.writeFileSync('results/$TEAM.json', JSON.stringify(r, null, 2));
            " 2>/dev/null || true

            kill $SERVER_PID 2>/dev/null
            wait $SERVER_PID 2>/dev/null || true
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2
          done

      - name: Generate leaderboard
        run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('results').filter(f => f.endsWith('.json'));
            const teams = files.map(f => JSON.parse(fs.readFileSync('results/' + f, 'utf8')));
            teams.sort((a, b) => (b.scoring?.total || 0) - (a.scoring?.total || 0));
            const now = new Date().toISOString().replace('T', ' ').slice(0, 19);

            // LEADERBOARD.md
            let lb = '# 🏆 Leaderboard -- Rinha FullStack SENAI 2026\n\n';
            lb += '> Atualizado em: ' + now + ' UTC\n\n';
            lb += '| # | Time | Pontos | Testes | Throughput | P95 | Status |\n';
            lb += '|---|------|--------|--------|------------|-----|--------|\n';
            teams.forEach((t, i) => {
              const s = t.summary || {};
              const sc = t.scoring || {};
              const m = t.metrics || {};
              const icon = t.error ? '❌' : s.fail === 0 ? '✅' : '⚠️';
              const pts = t.error ? '-' : (sc.total || 0) + '/100';
              const tests = t.error ? '-' : s.pass + '/' + s.total;
              const tput = m.throughput ? m.throughput + ' txn/s' : '-';
              const p95 = m.latency_p95_ms != null ? m.latency_p95_ms + 'ms' : '-';
              const status = t.error || (s.fail === 0 ? 'Perfeito' : s.fail + ' falha(s)');
              lb += '| ' + (i+1) + ' | ' + (t.team||t.info?.team||'?') + ' | **' + pts + '** | ' + tests + ' | ' + tput + ' | ' + p95 + ' | ' + icon + ' ' + status + ' |\n';
            });
            lb += '\n📋 [Resultado completo](./RESULTS.md)\n';
            fs.writeFileSync('LEADERBOARD.md', lb);

            // RESULTS.md
            let md = '# 📊 Resultados Completos -- Rinha FullStack SENAI 2026\n\n';
            md += '> Atualizado em: ' + now + ' UTC  \n';
            md += '> Total de times: ' + teams.length + '\n\n';
            md += '| # | Time | Pontos | Testes | Status |\n';
            md += '|---|------|--------|--------|--------|\n';
            teams.forEach((t, i) => {
              const s = t.summary || {};
              const sc = t.scoring || {};
              const pts = t.error ? '-' : (sc.total || 0) + '/100';
              const tests = t.error ? '-' : s.pass + '/' + s.total;
              md += '| ' + (i+1) + ' | ' + (t.team||'?') + ' | **' + pts + '** | ' + tests + ' | ' + (t.error || 'OK') + ' |\n';
            });
            md += '\n---\n\n';
            teams.forEach(t => {
              const info = t.info || {};
              const members = (info.members || []).map(m => m.name + ' (' + m.github + ')').join(', ');
              const s = t.summary || {};
              const sc = t.scoring || {};
              const m = t.metrics || {};
              md += '<details>\n<summary><strong>' + (t.team||'?') + '</strong> -- ' + (t.error ? '❌ ERRO' : '✅ ' + (sc.total||0) + '/100 pts — ' + s.pass + '/' + s.total + ' testes') + '</summary>\n\n';
              if (members) md += '**Membros:** ' + members + '\n\n';
              if (t.error) { md += '**Erro:** ' + t.error + '\n'; }
              else {
                // Scoring table
                md += '| Categoria | Testes | Pontos |\n';
                md += '|-----------|--------|--------|\n';
                md += '| Regras de negocio | ' + (sc.rules?.pass||0) + '/' + (sc.rules?.total||0) + ' | **' + (sc.rules?.score||0) + '/50** |\n';
                md += '| Frontend | ' + (sc.frontend?.pass||0) + '/' + (sc.frontend?.total||0) + ' | **' + (sc.frontend?.score||0) + '/30** |\n';
                md += '| Stress | ' + (sc.stress?.pass||0) + '/' + (sc.stress?.total||0) + ' | **' + (sc.stress?.score||0) + '/20** |\n';
                md += '| **Total** | **' + s.pass + '/' + s.total + '** | **' + (sc.total||0) + '/100** |\n\n';
                // Performance metrics
                if (m.throughput) {
                  md += '**Performance:**\n\n';
                  md += '| Metrica | Valor |\n';
                  md += '|---------|-------|\n';
                  md += '| Throughput | **' + m.throughput + ' txn/s** |\n';
                  md += '| Total | ' + (m.stress_created||0) + '/' + (m.stress_total||0) + ' txns em ' + (m.stress_elapsed_ms||0) + 'ms |\n';
                  md += '| Latencia avg | ' + (m.latency_avg_ms||'-') + 'ms |\n';
                  md += '| Latencia p50 | ' + (m.latency_p50_ms||'-') + 'ms |\n';
                  md += '| Latencia p95 | ' + (m.latency_p95_ms||'-') + 'ms |\n';
                  md += '| Latencia p99 | ' + (m.latency_p99_ms||'-') + 'ms |\n\n';
                }
                ['rules','frontend','stress'].forEach(cat => {
                  const items = t[cat] || [];
                  if (items.length === 0) return;
                  const title = {rules:'Regras de negocio',frontend:'Frontend (Playwright)',stress:'Stress test'}[cat];
                  const failing = items.filter(x => !x.ok);
                  const passing = items.filter(x => x.ok);
                  md += '**' + title + ':**\n';
                  if (failing.length > 0) {
                    failing.forEach(x => {
                      md += '- ❌ ' + x.name;
                      if (x.detail) md += ' — `' + x.detail + '`';
                      md += '\n';
                    });
                  }
                  if (passing.length > 0 && failing.length > 0) {
                    md += '<details><summary>✅ ' + passing.length + ' passando</summary>\n\n';
                    passing.forEach(x => { md += '- ✅ ' + x.name + '\n'; });
                    md += '</details>\n';
                  } else {
                    passing.forEach(x => {
                      md += '- ✅ ' + x.name;
                      if (x.detail) md += ' *(' + x.detail + ')*';
                      md += '\n';
                    });
                  }
                  md += '\n';
                });
              }
              md += '</details>\n\n';
            });
            fs.writeFileSync('RESULTS.md', md);
            console.log('Leaderboard e resultados gerados');
          "

      - name: Commit
        run: |
          git config user.name "rinha-bot[bot]"
          git config user.email "rinha-bot[bot]@users.noreply.github.com"
          git add LEADERBOARD.md RESULTS.md
          git diff --cached --quiet || git commit -m "chore: atualiza leaderboard e resultados"
          git push
